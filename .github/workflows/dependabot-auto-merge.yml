name: Dependabot auto-merge

# Auto-approves and enables auto-merge for low-risk Dependabot PRs (patch & minor,
# including the grouped updates) once all required checks pass. Major version bumps
# are left untouched for manual review.
#
# One-time repo settings required for this to take effect:
#   • Settings → General → Pull Requests → enable "Allow auto-merge".
#   • Settings → Actions → General → Workflow permissions →
#       enable "Allow GitHub Actions to create and approve pull requests".
#   • Branch protection on `main` requiring the CI checks, so auto-merge waits
#     for green instead of merging immediately.

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Approve and enable auto-merge for patch & minor
        if: >-
          steps.meta.outputs.update-type == 'version-update:semver-patch' ||
          steps.meta.outputs.update-type == 'version-update:semver-minor'
        run: |
          gh pr review --approve "$PR_URL"
          gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
