<svg xmlns="http://www.w3.org/2000/svg" width="240" height="228" viewBox="0 0 240 228" fill="none" role="img" aria-label="TokenItDown">
  <title>TokenItDown</title>
  <desc>A funnel ingesting documents and folders at the top and compressing them down through a vortex.</desc>
  <defs>
    <linearGradient id="coneFill" x1="40" y1="74" x2="200" y2="190" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2A3B4C"/>
      <stop offset="1" stop-color="#1E2C39"/>
    </linearGradient>
    <clipPath id="shotClip"><rect x="0" y="2" width="31" height="37" rx="3"/></clipPath>
  </defs>

  <!-- ===== FUNNEL CONE ===== -->
  <path d="M38 74 L202 74 L135 186 L105 186 Z" fill="url(#coneFill)" stroke="#B65D43" stroke-width="4" stroke-linejoin="round"/>
  <!-- ridge lines -->
  <g stroke="#C56B4E" stroke-width="2.4" stroke-linecap="round" opacity="0.9">
    <line x1="64" y1="80" x2="111" y2="183"/>
    <line x1="88" y1="80" x2="117" y2="183"/>
    <line x1="176" y1="80" x2="129" y2="183"/>
    <line x1="152" y1="80" x2="123" y2="183"/>
  </g>

  <!-- ===== MID: documents being converted into fragments ===== -->
  <g transform="translate(88 102) rotate(-10) scale(0.72)">
    <path d="M3 0 H20 L27 7 V33 a3 3 0 0 1 -3 3 H3 a3 3 0 0 1 -3 -3 V3 a3 3 0 0 1 3 -3 Z" fill="#6FA083" stroke="#2E4A3B" stroke-width="2"/>
    <path d="M20 0 V7 H27 Z" fill="#5A8A6F" stroke="#2E4A3B" stroke-width="1.5"/>
  </g>
  <g transform="translate(124 104) rotate(8) scale(0.72)">
    <path d="M2 4 h12 l3 -4 h16 a3 3 0 0 1 3 3 v23 a3 3 0 0 1 -3 3 H2 a3 3 0 0 1 -3 -3 V7 a3 3 0 0 1 3 -3 Z" fill="#3E8690" stroke="#1F4B51" stroke-width="2"/>
  </g>
  <!-- fragments cascading down toward the tokens -->
  <g stroke="#16222C" stroke-width="1.2" stroke-linejoin="round">
    <rect x="92" y="126" width="9" height="9" rx="1.5" fill="#6FA083" transform="rotate(18 96.5 130.5)"/>
    <rect x="131" y="126" width="8" height="8" rx="1.5" fill="#3E8690" transform="rotate(-14 135 130)"/>
    <path d="M118 127 l6 6 l-6 6 l-6 -6 Z" fill="#57A6B0"/>
    <rect x="102" y="140" width="8" height="8" rx="1.5" fill="#BB5A41" transform="rotate(24 106 144)"/>
    <rect x="123" y="141" width="7" height="7" rx="1.5" fill="#ECDFC8" transform="rotate(-18 126.5 144.5)"/>
    <path d="M114 152 l5 5 l-5 5 l-5 -5 Z" fill="#3A5066"/>
    <rect x="124" y="154" width="6" height="6" rx="1.2" fill="#D6A668" transform="rotate(30 127 157)"/>
    <rect x="108" y="165" width="5.5" height="5.5" rx="1.2" fill="#6FA083" transform="rotate(20 110.75 167.75)"/>
    <path d="M120 166 l4 4 l-4 4 l-4 -4 Z" fill="#57A6B0"/>
  </g>

  <!-- ===== MOUTH (rim + opening) ===== -->
  <ellipse cx="120" cy="74" rx="82" ry="19" fill="#B65D43"/>
  <ellipse cx="120" cy="74" rx="73" ry="13.5" fill="#1B2833"/>

  <!-- ===== TOP DOCUMENTS poking out ===== -->
  <!-- folder (back) -->
  <g transform="translate(0 0)">
    <path d="M92 44 h20 l6 -7 h34 a3 3 0 0 1 3 3 v44 a3 3 0 0 1 -3 3 h-60 a3 3 0 0 1 -3 -3 V47 a3 3 0 0 1 3 -3 Z" fill="#CFA062" stroke="#7C5A2E" stroke-width="2"/>
    <path d="M89 56 h66 a3 3 0 0 1 3 3 v25 a3 3 0 0 1 -3 3 h-66 a3 3 0 0 1 -3 -3 V59 a3 3 0 0 1 3 -3 Z" fill="#E0B97A" stroke="#7C5A2E" stroke-width="2"/>
  </g>
  <!-- left screenshot / image tile -->
  <g transform="translate(60 38) rotate(-13)">
    <g clip-path="url(#shotClip)">
      <rect x="0" y="2" width="31" height="37" fill="#D8E7EC"/>
      <circle cx="8.5" cy="12.5" r="3.8" fill="#E3A53F"/>
      <path d="M-1 39 L11 19 L17.5 28 L23 21 L32 39 Z" fill="#3E8690"/>
      <path d="M-1 39 L9 25 L16 39 Z" fill="#5A8A6F"/>
    </g>
    <rect x="0" y="2" width="31" height="37" rx="3" fill="none" stroke="#B65D43" stroke-width="2.6"/>
  </g>
  <!-- center navy doc -->
  <g transform="translate(102 30) rotate(-1)">
    <path d="M3 0 H24 L33 9 V44 a3 3 0 0 1 -3 3 H3 a3 3 0 0 1 -3 -3 V3 a3 3 0 0 1 3 -3 Z" fill="#28435A" stroke="#14222E" stroke-width="2"/>
    <path d="M24 0 V9 H33 Z" fill="#1B3043" stroke="#14222E" stroke-width="1.4"/>
    <g stroke="#E8DAC1" stroke-width="2.2" stroke-linecap="round"><line x1="7" y1="18" x2="26" y2="18"/><line x1="7" y1="25" x2="26" y2="25"/><line x1="7" y1="32" x2="26" y2="32"/><line x1="7" y1="39" x2="20" y2="39"/></g>
  </g>
  <!-- right spreadsheet doc -->
  <g transform="translate(150 33) rotate(13)">
    <path d="M3 0 H22 L31 9 V40 a3 3 0 0 1 -3 3 H3 a3 3 0 0 1 -3 -3 V3 a3 3 0 0 1 3 -3 Z" fill="#ECDFC8" stroke="#8A6B3A" stroke-width="2"/>
    <path d="M22 0 V9 H31 Z" fill="#D8C39C" stroke="#8A6B3A" stroke-width="1.4"/>
    <!-- table -->
    <rect x="6" y="15" width="20" height="6.5" fill="#5A8A6F"/>
    <g stroke="#8A6B3A" stroke-width="1">
      <line x1="12.7" y1="15" x2="12.7" y2="38"/>
      <line x1="19.3" y1="15" x2="19.3" y2="38"/>
      <line x1="6" y1="21.5" x2="26" y2="21.5"/>
      <line x1="6" y1="27" x2="26" y2="27"/>
      <line x1="6" y1="32.5" x2="26" y2="32.5"/>
    </g>
    <rect x="6" y="15" width="20" height="23" rx="1" fill="none" stroke="#8A6B3A" stroke-width="1.6"/>
  </g>

  <!-- front lip of rim over doc bottoms -->
  <path d="M38 74 A82 19 0 0 0 202 74" fill="none" stroke="#9C4E37" stroke-width="5" stroke-linecap="round"/>

  <!-- ===== SPOUT ===== -->
  <path d="M105 186 L135 186 L129 204 L111 204 Z" fill="#243340" stroke="#B65D43" stroke-width="3.5" stroke-linejoin="round"/>

  <!-- ===== OUTPUT TOKENS (tidy chips) ===== -->
  <g stroke="#16222C" stroke-width="1" stroke-linejoin="round">
    <rect x="-3.4" y="-3.4" width="6.8" height="6.8" rx="1.7" fill="#3E8690" transform="translate(112 212) rotate(-7)"/>
    <rect x="-3.6" y="-3.6" width="7.2" height="7.2" rx="1.8" fill="#D6A668" transform="translate(120 214)"/>
    <rect x="-3.4" y="-3.4" width="6.8" height="6.8" rx="1.7" fill="#5A8A6F" transform="translate(128 212) rotate(7)"/>
  </g>
</svg>
