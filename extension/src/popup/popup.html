<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TokenItDown</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div id="app">
      <header>
        <span class="logo">TokenItDown</span>
      </header>

      <main>
        <button id="capture-btn" class="btn-primary">
          Capture Full Page
        </button>

        <button id="save-btn" class="btn-primary btn-accent">
          Save page to TokenItDown
        </button>

        <div class="target-row">
          <label for="target-select">Convert via</label>
          <select id="target-select"></select>
        </div>

        <div id="save-status" class="save-status hidden"></div>

        <div id="save-result" class="save-result hidden">
          <div class="save-result-msg">Saved to your library ✓</div>
          <div class="result-actions">
            <a id="save-download-md" class="btn-secondary" download="page.md">
              Download Markdown
            </a>
            <a id="open-library" class="btn-secondary" target="_blank" rel="noopener">
              Open Library
            </a>
          </div>
        </div>

        <div id="status" class="status hidden">
          <div id="status-text"></div>
          <div id="progress-bar">
            <div id="progress-fill"></div>
          </div>
        </div>

        <div id="result" class="hidden">
          <div class="result-meta">
            <div id="route-badge" class="route-badge hidden"></div>
            <div id="token-stats" class="token-stats hidden"></div>
          </div>
          <img id="preview" alt="Screenshot preview" />
          <div class="result-actions">
            <a id="download-link" download="screenshot.png" class="btn-secondary">
              Download PNG
            </a>
            <a id="download-md" download="page.md" class="btn-secondary">
              Download Markdown
            </a>
          </div>
        </div>

        <div id="error" class="error hidden"></div>
      </main>
    </div>
    <script type="module" src="popup.js"></script>
  </body>
</html>
